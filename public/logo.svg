<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Simple Georgian-flag style in green on transparent background -->
  <g fill="#39ff14">
    <!-- central cross -->
    <rect x="28" y="10" width="8" height="44" rx="1"/>
    <rect x="10" y="28" width="44" height="8" rx="1"/>

    <!-- four smaller crosses -->
    <g transform="translate(20 20)">
      <rect x="-1.5" y="-5" width="3" height="10" rx="0.7"/>
      <rect x="-5" y="-1.5" width="10" height="3" rx="0.7"/>
    </g>
    <g transform="translate(44 20)">
      <rect x="-1.5" y="-5" width="3" height="10" rx="0.7"/>
      <rect x="-5" y="-1.5" width="10" height="3" rx="0.7"/>
    </g>
    <g transform="translate(20 44)">
      <rect x="-1.5" y="-5" width="3" height="10" rx="0.7"/>
      <rect x="-5" y="-1.5" width="10" height="3" rx="0.7"/>
    </g>
    <g transform="translate(44 44)">
      <rect x="-1.5" y="-5" width="3" height="10" rx="0.7"/>
      <rect x="-5" y="-1.5" width="10" height="3" rx="0.7"/>
    </g>
  </g>
</svg>
